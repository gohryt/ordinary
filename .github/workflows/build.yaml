name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  CARGO_NET_GIT_FETCH_WITH_CLI: true
  RUST_BACKTRACE: short
  LINUX_SYSTEM_DEPENDENCIES: >-
    pkg-config
    libfontconfig-dev
    libwayland-dev
    libxkbcommon-x11-dev
    libvulkan-dev
    libxcb-composite0-dev
    libxcb-present-dev
    libxcb-shape0-dev
    libxcb-xfixes0-dev
    libxcb-render0-dev
    libxcb-randr0-dev
    libxcb-xinput-dev
    libxcb-xkb-dev
    libxcb-cursor-dev
    libxcb-sync-dev
    libxcb-dpms0-dev
    libxcb-res0-dev

jobs:
  build-linux:
    name: Build · Linux x86_64 (wayland)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: sudo apt-get update -qq && sudo apt-get install -y -qq --no-install-recommends $LINUX_SYSTEM_DEPENDENCIES

      - name: Install Rust
        uses: dtolnay/rust-toolchain@nightly

      - name: Cache
        uses: Swatinem/rust-cache@v2
        with:
          key: linux-wayland

      - name: Build
        run: cargo build --locked --release --workspace --bins

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ordinary-linux-x86_64-wayland
          path: |
            target/release/bar
            target/release/launcher
            target/release/xembed-bridge
          if-no-files-found: error
          retention-days: 14
          compression-level: 9

  release:
    name: Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-linux]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare assets
        run: |
          mkdir -p release
          cp artifacts/ordinary-linux-x86_64-wayland/bar release/ordinary-bar-linux-x86_64-wayland
          cp artifacts/ordinary-linux-x86_64-wayland/launcher release/ordinary-launcher-linux-x86_64-wayland
          cp artifacts/ordinary-linux-x86_64-wayland/xembed-bridge release/ordinary-xembed-bridge-linux-x86_64-wayland
          chmod +x release/ordinary-*
          cd release && sha256sum * > SHA256SUMS

      - name: Publish
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          draft: true
          generate_release_notes: true
